# Copy this file to settings.toml and fill in your HuggingFace token.
#
# 1. Create a HuggingFace account and token at:
#    https://huggingface.co/settings/tokens  (a "Read" token is enough)
# 2. Accept the model terms on these pages (one-off, while logged in):
#    https://huggingface.co/pyannote/speaker-diarization-community-1
#    https://huggingface.co/pyannote/segmentation-3.0

hf_token = "hf_YOUR_TOKEN_HERE"

# Optional: override default folders. Defaults shown.
# inbox  = "~/Transcripts/in"
# outbox = "~/Transcripts/out"

# Optional: override the transcription model. Default shown.
# model = "mlx-community/parakeet-tdt-0.6b-v2"

# Use MPS (Apple Silicon GPU) for the diarisation step.
# parakeet-mlx always uses the MLX GPU automatically.
# Falls back to CPU automatically if MPS fails.
device_mps = true
